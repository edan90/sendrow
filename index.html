<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading Video...</title>
  <meta name="robots" content="noindex">
  <style>
    body {
      background: #121212;
      color: #fff;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    .card {
      background: #1e1e1e;
      border-radius: 16px;
      padding: 30px 20px;
      max-width: 400px;
      margin: 50px auto;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    #countdown {
      font-size: 60px;
      color: #ff4747;
      margin: 10px 0;
    }
    #bar-bg {
      background: #333;
      border-radius: 10px;
      margin-top: 20px;
    }
    #bar {
      width: 0%;
      background: #ff4747;
      height: 8px;
      border-radius: 10px;
      transition: width 1s linear;
    }
    #tips {
      font-size: 14px;
      color: #aaa;
      margin-top: 15px;
      min-height: 40px;
    }
    .ads-box {
      margin: 20px 0;
      min-height: 50px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Your Video Is Almost Ready 🎬</h2>
    <p>Opening automatically in:</p>
    <h1 id="countdown">6</h1>
    
    <div id="bar-bg">
      <div id="bar"></div>
    </div>
    <p id="tips">Fun Fact: Cats spend 70% of their lives sleeping 😴</p>

    <!-- SOCIAL BAR ADSTERRA LU UDAH GUE PASANG DI SINI -->
    <div class="ads-box">
      <script src="https://pl29169098.profitablecpmratenetwork.com/65/2d/4e/652d4ef4510d0b245a5d85b625a7bc08.js"></script>
    </div>

    <p style="font-size:12px; color:#666; margin-top:25px;">Please don't close this page</p>
  </div>

<script>
let detik = 6;
let countdownEl = document.getElementById('countdown');
let bar = document.getElementById('bar');
let tips = [
  "Fun Fact: Cats can't taste sweetness 🐱",
  "Your video is loading... 99% awesomeness", 
  "Pro tip: Don't blink or you'll miss #3 😂",
  "Almost there... preparing your daily dose of laughs",
  "Warning: Video may cause extreme laughter 😂"
];
document.getElementById('tips').innerText = tips[Math.floor(Math.random()*tips.length)];

let progress = setInterval(() => {
  detik--;
  countdownEl.innerText = detik;
  bar.style.width = (100 - detik*16.666) + '%';
  if(detik <= 0) {
    clearInterval(progress);
    window.location.href = 'GANTI_PAKE_LINK_ADSTERRA_DIRECT_LU'; // INI WAJIB GANTI KAK
  }
}, 1000);
</script>
</body>
</html>
