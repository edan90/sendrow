<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading Video...</title>
<meta name="robots" content="noindex">
<style>
  body { background: #121212; color: #fff; font-family: Arial, sans-serif; margin: 0; padding: 20px; text-align: center; }
  .card { background: #1e1e1e; border-radius: 16px; padding: 30px 20px; max-width: 500px; margin: 50px auto; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
  #countdown { font-size: 60px; color: #ff4747; margin: 10px 0; }
  #bar-bg { background: #333; border-radius: 10px; margin-top: 20px; }
  #bar { width: 0%; background: #ff4747; height: 8px; border-radius: 10px; transition: width 1s linear; }
  #tips { font-size: 14px; color: #aaa; margin-top: 15px; min-height: 40px; }
  #videoWrap { display: none; margin-top: 20px; }
  #videoWrap video { width: 100%; border-radius: 12px; max-height: 400px; background: #000; }
</style>
</head>
<body>
<div class="card">
  <h2>Your Video Is Almost Ready 🎬</h2>
  
  <div id="loadingBox">
    <p>Opening automatically in:</p>
    <h1 id="countdown">4</h1>
    <div id="bar-bg"><div id="bar"></div></div>
    <p id="tips">Fun Fact: Cats spend 70% of their lives sleeping 😺</p>
  </div>

  <div id="videoWrap">
    <video id="player" controls autoplay muted playsinline></video>
  </div>

  <p style="font-size:12px; color:#666; margin-top:25px;">Please don't close this page</p>
</div>

<script>
let detik = 4;
const countdownEl = document.getElementById('countdown');
const bar = document.getElementById('bar');
const tips = [
  "Fun Fact: Cats can't taste sweetness 😺",
  "Your video is loading... 99% awesomeness", 
  "Pro tip: Don't blink or you'll miss #3 😂",
  "Almost there... preparing your daily dose of laughs",
  "Warning: Video may cause extreme laughter 😂"
];
document.getElementById('tips').innerText = tips[Math.floor(Math.random()*tips.length)];

// GANTI LINK INI PAKE LINK IMGUR LU YANG .MP4
const videoUrl = 'https://i.imgur.com/UloqdZw.mp4'; 

const progress = setInterval(() => {
  countdownEl.innerText = detik;
  bar.style.width = (100 - detik*25) + '%';
  detik--;
  if(detik < 0) {
    clearInterval(progress);
    document.getElementById('loadingBox').style.display = 'none';
    document.getElementById('videoWrap').style.display = 'block';
    document.getElementById('player').src = videoUrl;
  }
}, 1000);
</script>
</body>
</html>
